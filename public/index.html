<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Team Task Manager</title>
  <meta name="description" content="TaskFlow: A role-based team task management app with projects, members, and real-time task tracking." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">

  <!-- ── Background decoration ── -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>

  <main class="auth-container" id="auth-container">
    <!-- Logo -->
    <div class="auth-logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">TaskFlow</span>
    </div>

    <!-- Tab switcher -->
    <div class="tab-switcher" role="tablist">
      <button class="tab-btn active" id="tab-login"  role="tab" onclick="switchTab('login')">Login</button>
      <button class="tab-btn"        id="tab-signup" role="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Error banner -->
    <div class="error-banner hidden" id="auth-error" role="alert"></div>

    <!-- ── LOGIN FORM ── -->
    <form id="login-form" class="auth-form" novalidate>
      <div class="field-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="field-group">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">
        <span class="btn-text">Login</span>
        <span class="btn-spinner hidden"></span>
      </button>
    </form>

    <!-- ── SIGNUP FORM ── -->
    <form id="signup-form" class="auth-form hidden" novalidate>
      <div class="field-group">
        <label for="signup-name">Full Name</label>
        <input type="text" id="signup-name" placeholder="Alice Admin" required autocomplete="name" />
      </div>
      <div class="field-group">
        <label for="signup-email">Email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="field-group">
        <label for="signup-password">Password <span class="hint">(min 6 chars)</span></label>
        <input type="password" id="signup-password" placeholder="••••••••" required autocomplete="new-password" />
      </div>
      <div class="field-group">
        <label for="signup-role">Role</label>
        <select id="signup-role">
          <option value="member">Member</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="signup-btn">
        <span class="btn-text">Create Account</span>
        <span class="btn-spinner hidden"></span>
      </button>
    </form>
  </main>

  <script src="api.js"></script>
  <script src="script.js"></script>
</body>
</html>
